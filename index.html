<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoExport Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0A0B09;
  --paper: #F5F3EE;
  --card: #FFFFFF;
  --accent: #D4FF00;
  --accent2: #FF4500;
  --steel: #2A2D27;
  --muted: #8A8E84;
  --border: rgba(0,0,0,0.08);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--ink);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--accent);
  letter-spacing: 2px;
  white-space: nowrap;
}

.search-wrap {
  flex: 1;
  max-width: 360px;
}

.search-input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.search-input::placeholder { color: rgba(255,255,255,0.35); }
.search-input:focus { border-color: var(--accent); }

.top-filters {
  display: flex;
  gap: 6px;
  align-items: center;
  flex: 1;
}

.filter-pill {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  font-family: 'DM Sans', sans-serif;
}
.filter-pill:hover { background: rgba(255,255,255,0.12); color: #fff; }
.filter-pill.on { background: var(--accent); color: var(--ink); border-color: var(--accent); font-weight: 600; }

.sort-group {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 3px;
}
.sort-btn {
  background: none;
  border: none;
  padding: 5px 10px;
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  border-radius: 6px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: all .15s;
}
.sort-btn.on { background: var(--accent); color: var(--ink); font-weight: 600; }
.sort-btn:hover:not(.on) { color: #fff; }

.favs-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
  transition: all .15s;
}
.favs-btn.on { border-color: #FFB800; color: #FFB800; background: rgba(255,184,0,0.1); }
.favs-btn:hover:not(.on) { color: #fff; border-color: rgba(255,255,255,0.3); }

/* ── STATS BAR ── */
.statsbar {
  background: var(--ink);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 10px 28px;
  display: flex;
  gap: 32px;
  align-items: center;
}
.stat {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 1px;
}
.stat-lbl {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: rgba(255,255,255,0.35);
}
.stat-divider {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.08);
}

/* ── RANGE FILTERS ── */
.range-bar {
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  gap: 32px;
  align-items: center;
}
.range-item {
  display: flex;
  align-items: center;
  gap: 10px;
}
.range-lbl {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  min-width: 80px;
}
.range-val {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  min-width: 55px;
}
input[type=range] {
  width: 120px;
  accent-color: var(--ink);
  cursor: pointer;
}

/* ── GRID ── */
.grid-wrap {
  padding: 20px 28px 40px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow);
  border: 1.5px solid transparent;
  transition: transform .15s, box-shadow .15s, border-color .15s;
  position: relative;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.13);
  border-color: var(--ink);
}
.card.fav { border-color: #FFB800; }

/* Car image */
.car-img {
  width: 100%;
  height: 160px;
  position: relative;
  overflow: hidden;
  background: #f0ede6;
}
.car-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .3s;
}
.card:hover .car-img img { transform: scale(1.04); }
.car-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #f0ede6 0%, #e5e2da 100%);
  gap: 6px;
}
.car-img-placeholder span { font-size: 40px; opacity: .3; }
.car-img-placeholder small { font-size: 11px; color: var(--muted); }

/* Badges on image */
.badge-score {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--ink);
  color: var(--accent);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  padding: 3px 8px;
  border-radius: 6px;
}
.badge-src {
  position: absolute;
  top: 10px;
  right: 36px;
  background: rgba(0,0,0,0.6);
  color: rgba(255,255,255,0.8);
  font-size: 9px;
  padding: 3px 7px;
  border-radius: 4px;
  letter-spacing: .3px;
}
.badge-fav {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 26px;
  height: 26px;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  cursor: pointer;
  border: none;
  transition: background .15s, transform .15s;
  z-index: 2;
}
.badge-fav:hover { background: rgba(255,184,0,0.8); transform: scale(1.1); }
.badge-fav.on { background: rgba(255,184,0,0.9); }
.badge-tax {
  position: absolute;
  bottom: 8px;
  left: 8px;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: .3px;
}
.tax-max { background: rgba(255,69,0,0.85); color: #fff; }
.tax-mid { background: rgba(245,166,35,0.85); color: #111; }
.tax-low { background: rgba(100,200,100,0.85); color: #111; }

/* Card body */
.card-body { padding: 12px 14px 14px; }

.card-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.card-meta {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}

.card-price-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 8px;
}
.card-buy-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1px;
  line-height: 1;
  color: var(--ink);
}
.card-total {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.card-profit {
  text-align: right;
}
.profit-pill {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  margin-bottom: 2px;
}
.pp-great { background: #D4FF00; color: var(--ink); }
.pp-good  { background: #FFF3CD; color: #7A4500; }
.pp-low   { background: #FFE5E0; color: #8B1A00; }
.pp-none  { background: #F0F0F0; color: var(--muted); }
.profit-amt { font-size: 11px; color: var(--muted); }
.profit-amt b { color: #2A7A2A; }

/* Spain price */
.spain-bar {
  background: #F8F6F1;
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
}
.spain-lbl { font-size: 10px; color: var(--muted); margin-bottom: 1px; }
.spain-val { font-size: 12px; font-weight: 700; color: #1A5FA8; }
.spain-val.pending { color: var(--muted); font-weight: 400; font-style: italic; font-size: 10px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--card);
  border-radius: 16px;
  width: 100%;
  max-width: 620px;
  max-height: 93vh;
  overflow-y: auto;
  position: relative;
}

/* Nav arrows */
.modal-nav {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  z-index: 201;
  background: var(--ink);
  color: var(--accent);
  border: none;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s, transform .15s;
  font-family: 'DM Sans', sans-serif;
}
.modal-nav:hover { background: #333; transform: translateY(-50%) scale(1.08); }
.modal-nav.prev { left: max(16px, calc(50% - 340px)); }
.modal-nav.next { right: max(16px, calc(50% - 340px)); }

.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 10;
  background: rgba(0,0,0,0.6);
  border: none;
  color: #fff;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
}

.modal-img {
  width: 100%;
  height: 220px;
  background: #f0ede6;
  border-radius: 16px 16px 0 0;
  overflow: hidden;
  position: relative;
}
.modal-img img { width: 100%; height: 100%; object-fit: cover; }
.modal-img-ph {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  opacity: .15;
  background: linear-gradient(135deg, #f0ede6 0%, #e5e2da 100%);
}

.modal-body { padding: 20px 24px 28px; }
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 1.5px;
  color: var(--ink);
  margin-bottom: 4px;
}
.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.modal-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Section */
.msec { margin-bottom: 20px; }
.msec-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 600;
}

/* Cost table */
.cost-rows { display: flex; flex-direction: column; gap: 0; }
.cost-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.cost-row:last-child { border-bottom: none; }
.cost-row .cl { color: #555; }
.cost-row .cv { font-weight: 600; }
.cost-row .cv.r { color: #CC2200; }
.cost-row .cv.g { color: #1A7A1A; }
.cost-row.total-row {
  background: var(--ink);
  color: #fff;
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 6px;
  border-bottom: none;
}
.cost-row.total-row .cl { color: rgba(255,255,255,0.7); font-weight: 500; }
.cost-row.total-row .cv { color: var(--accent); font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 1px; }

.tax-alert {
  background: #FFF3F0;
  border: 1px solid #FFCCC0;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11px;
  line-height: 1.6;
  color: #555;
  margin-top: 8px;
}
.tax-alert strong { color: #CC2200; }

/* Spain price in modal */
.spain-modal-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.spain-src-card {
  background: #F8F6F1;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
}
.spain-src-card.has { border-color: #B8D4F0; background: #EEF5FB; }
.ssc-name { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 4px; }
.ssc-val { font-size: 13px; font-weight: 700; color: #1A5FA8; }
.ssc-val.none { color: var(--muted); font-size: 11px; font-weight: 400; font-style: italic; }

.spain-avg-box {
  background: #1A5FA8;
  color: #fff;
  border-radius: 8px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sab-lbl { font-size: 11px; opacity: .8; }
.sab-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; }

.spain-loading {
  background: #F8F6F1;
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.dot-loader span {
  width: 6px; height: 6px; border-radius: 50%; background: #1A5FA8;
  display: inline-block; animation: dl 1.2s infinite;
}
.dot-loader span:nth-child(2) { animation-delay: .2s; }
.dot-loader span:nth-child(3) { animation-delay: .4s; }
@keyframes dl { 0%,80%,100%{opacity:.2;transform:scale(.7)} 40%{opacity:1;transform:scale(1)} }

/* Result box */
.result-box {
  background: var(--ink);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}
.rb-lbl { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 2px; }
.rb-margin { font-size: 11px; color: rgba(255,255,255,0.4); }
.rb-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 1px;
}
.rb-val.pos { color: var(--accent); }
.rb-val.neg { color: #FF4500; }
.rb-val.unk { color: rgba(255,255,255,0.3); font-size: 20px; }

/* Score */
.score-bar-track {
  height: 6px;
  background: #eee;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 10px;
}
.score-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.score-factor {
  background: #F8F6F1;
  border-radius: 7px;
  padding: 7px 10px;
  display: flex;
  justify-content: space-between;
  font-size: 11px;
}
.sf-lbl { color: var(--muted); }
.sf-val { font-weight: 700; }

.modal-link {
  display: block;
  margin-top: 16px;
  background: var(--ink);
  color: var(--accent);
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 1.5px;
  text-decoration: none;
  transition: background .15s;
}
.modal-link:hover { background: #333; }

/* Empty/loader */
.empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}
.empty strong {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 1px;
  color: var(--ink);
  margin-bottom: 8px;
}
.loader {
  grid-column: 1/-1;
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 60px;
}
.loader span {
  width: 8px; height: 8px; border-radius: 50%; background: var(--ink);
  animation: dl 1.2s infinite;
}
.loader span:nth-child(2) { animation-delay: .2s; }
.loader span:nth-child(3) { animation-delay: .4s; }

@media(max-width:700px) {
  .topbar { flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 8px; }
  .top-filters { display: none; }
  .range-bar { flex-wrap: wrap; gap: 12px; padding: 10px 16px; }
  .grid-wrap { padding: 14px 16px 30px; }
  .grid { grid-template-columns: 1fr; }
  .modal-nav { display: none; }
}
</style>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const CFG = {
  supabase_url: "https://hkmfxnqvtklsynrfxjoc.supabase.co",
  supabase_key: "sb_publishable_Pg7zX6lauC6LoKXhSr02mg_z6Zp307_",
};

// ── IMÁGENES — usamos Unsplash con query por modelo ─────────
// Unsplash Source API: funciona sin autenticación, sin bloqueos CORS
function getCarImageUrl(car) {
  const t = ((car.title||'') + ' ' + (car.model||'')).toLowerCase();
  let query = 'car automobile';
  if (t.includes('camaro'))    query = 'chevrolet+camaro+muscle+car';
  else if (t.includes('mustang'))   query = 'ford+mustang+gt+muscle';
  else if (t.includes('challenger')) query = 'dodge+challenger+srt';
  else if (t.includes('charger'))   query = 'dodge+charger+muscle';
  else if (t.includes('corvette'))  query = 'chevrolet+corvette+c8';
  else if (t.includes('ram') && (t.includes('1500')||t.includes('2500')||t.includes('trx'))) query = 'dodge+ram+pickup+truck';
  else if (t.includes('f-150')||t.includes('f150')) query = 'ford+f150+raptor+truck';
  else if (t.includes('f-250')||t.includes('f250')) query = 'ford+f250+truck';
  else if (t.includes('silverado')) query = 'chevrolet+silverado+truck';
  else if (t.includes('tundra'))    query = 'toyota+tundra+pickup';
  else if (t.includes('tahoe'))     query = 'chevrolet+tahoe+suv';
  else if (t.includes('suburban'))  query = 'chevrolet+suburban+suv';
  else if (t.includes('escalade'))  query = 'cadillac+escalade+suv';
  else if (t.includes('navigator')) query = 'lincoln+navigator+suv';
  else if (t.includes('expedition'))query = 'ford+expedition+suv';
  else if (t.includes('bronco'))    query = 'ford+bronco+off+road';
  else if (t.includes('wrangler'))  query = 'jeep+wrangler+rubicon';
  else if (t.includes('hummer'))    query = 'hummer+suv';
  else if (t.includes('m3'))        query = 'bmw+m3+sport+car';
  else if (t.includes('m4'))        query = 'bmw+m4+coupe';
  else if (t.includes('m5'))        query = 'bmw+m5+sedan';
  else if (t.includes('rs6'))       query = 'audi+rs6+avant+wagon';
  else if (t.includes('rs7'))       query = 'audi+rs7+sportback';
  else if (t.includes('amg'))       query = 'mercedes+amg+gt+sport';
  else if (t.includes('c63'))       query = 'mercedes+amg+c63';
  else if (t.includes('e63'))       query = 'mercedes+amg+e63';
  else if (t.includes('z4'))        query = 'bmw+z4+roadster';
  else if (t.includes('supra'))     query = 'toyota+supra+sport';
  else if (t.includes('ct5')||t.includes('cadillac')) query = 'cadillac+sport+sedan';
  // Usamos picsum con seed basado en el modelo para imagen consistente
  const seed = query.split('+').join('').substring(0, 20);
  return `https://source.unsplash.com/400x240/?${query}`;
}

// ── CO2 y MATRICULACIÓN ─────────────────────────────────────
const CO2 = {
  camaro:220,mustang:224,challenger:290,charger:295,corvette:230,
  "ram 1500":320,"ram 2500":350,"f-150":285,"f-250":340,
  silverado:310,tundra:265,tahoe:290,suburban:295,
  escalade:300,navigator:295,expedition:280,bronco:240,
  wrangler:210,m3:175,m4:178,m5:215,"amg gt":240,
  c63:195,e63:205,rs6:195,rs7:198,z4:155,
  hummer:350,lincoln:295,supra:190,ct5:210,
};

function getCO2(car) {
  const t = ((car.title||'')+(car.model||'')).toLowerCase();
  for (const [k,v] of Object.entries(CO2)) if (t.includes(k)) return v;
  return (car.cv||0)>=400 ? 260 : 200;
}

function getTaxInfo(co2) {
  if (co2>=200) return {rate:0.1475, label:"14.75%", cls:"tax-max"};
  if (co2>=160) return {rate:0.0975, label:"9.75%",  cls:"tax-mid"};
  if (co2>=120) return {rate:0.0475, label:"4.75%",  cls:"tax-low"};
  return {rate:0, label:"0%", cls:"tax-low"};
}

function calcTax(price, co2, year) {
  const ti = getTaxInfo(co2);
  const age = new Date().getFullYear() - (year || new Date().getFullYear());
  const cs = [1,.84,.73,.64,.56,.49,.43,.38];
  return Math.round(price * (cs[Math.min(age,cs.length-1)]) * ti.rate);
}

const FIXED_COSTS = { transport:850, itv:80, gestoria:300, dgt:135, traduccion:80 };
const FIXED_TOTAL = 1445;

function enrichCar(c) {
  const co2 = getCO2(c);
  const ti  = getTaxInfo(co2);
  const tax = calcTax(c.price||0, co2, c.year);
  const totalCost = (c.price||0) + FIXED_TOTAL + tax;
  const spain = c.spain_ref_price||0;
  const profit = spain > 0 ? spain - totalCost : 0;
  const margin = spain > 0 ? Math.round((profit/spain)*100) : 0;
  let sp = {};
  try { sp = JSON.parse(c.spain_prices_detail||'{}'); } catch(e){}
  const t = ((c.title||'')+(c.model||'')).toLowerCase();
  let cat = 'otro';
  const CM = {
    muscle:['camaro','mustang','challenger','charger','corvette'],
    pickup:['ram','f-150','f150','f-250','f250','silverado','tundra','tacoma'],
    suv:['tahoe','suburban','escalade','navigator','expedition','bronco','wrangler','hummer','yukon'],
    sport:['m3','m4','m5','m8','amg','c63','e63','rs6','rs7','rs3','ct5','supra'],
    cabrio:['convertible','cabrio','roadster','z4'],
  };
  for (const [k,v] of Object.entries(CM)) if (v.some(x=>t.includes(x))) { cat=k; break; }
  return {...c, co2, taxInfo:ti, tax, totalCost, profit, margin, spain_prices_obj:sp, category:cat};
}

// ── SPAIN PRICE via Claude API ──────────────────────────────
const SPAIN_CACHE = {};
async function getSpainPrice(car) {
  const key = `${car.make}_${car.model}_${car.year}`.toLowerCase().replace(/\s+/g,'_');
  if (SPAIN_CACHE[key]) return SPAIN_CACHE[key];
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:250,
        system:"Eres experto en el mercado de coches de segunda mano en España. Responde SOLO con JSON válido sin markdown.",
        messages:[{role:"user",content:`Precio de mercado actual en España para: ${car.year||''} ${car.make||''} ${car.model||''} con ${car.km||30000} km. Basado en coches.net, autoscout24.es y milanuncios. Responde EXACTAMENTE: {"min":NUMBER,"avg":NUMBER,"max":NUMBER}`}]
      })
    });
    if (!r.ok) throw new Error(`${r.status}`);
    const d = await r.json();
    const txt = (d.content?.[0]?.text||'').replace(/```[^`]*```/g,'').trim();
    const parsed = JSON.parse(txt);
    SPAIN_CACHE[key] = parsed;
    return parsed;
  } catch(e) {
    return null;
  }
}

let ALL=[], FILT=[], SORT='score', SHOW_FAVS=false;
let FAVS = new Set(JSON.parse(localStorage.getItem('ae_favs')||'[]'));
let MODAL_IDX = -1;
const fmt = n => new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
const FLAG = {DE:"🇩🇪",FR:"🇫🇷",BE:"🇧🇪",PL:"🇵🇱",PT:"🇵🇹"};

function saveFavs() { localStorage.setItem('ae_favs', JSON.stringify([...FAVS])); }
function isFav(c) { return FAVS.has(c.url||String(c.id)); }
function toggleFav(idx, e) {
  e.stopPropagation();
  const c = ALL[idx];
  const id = c.url||String(c.id);
  if (FAVS.has(id)) FAVS.delete(id); else FAVS.add(id);
  saveFavs();
  renderGrid();
  updateStats();
}

// ── LOAD ────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('grid').innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';
  try {
    const r = await fetch(`${CFG.supabase_url}/rest/v1/cars?select=*&order=opportunity_score.desc&limit=500`,
      {headers:{"apikey":CFG.supabase_key,"Authorization":`Bearer ${CFG.supabase_key}`}});
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    ALL = data.map(enrichCar);
    applyFilters();
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty"><strong>Error</strong>${e.message}</div>`;
  }
}

// ── FILTERS ─────────────────────────────────────────────────
function applyFilters() {
  const pmin  = +document.getElementById('pmin').value;
  const pmax  = +document.getElementById('pmax').value;
  const yr    = +document.getElementById('ymin').value;
  const q     = document.getElementById('search').value.toLowerCase();
  const activeCats = [...document.querySelectorAll('.cat-pill.on')].map(x=>x.dataset.cat);
  const activeCnts = [...document.querySelectorAll('.cnt-pill.on')].map(x=>x.dataset.cnt);

  let src = SHOW_FAVS ? ALL.filter(c=>isFav(c)) : ALL;

  FILT = src.filter(c => {
    if ((c.price||0)<pmin || (c.price||0)>pmax) return false;
    if ((c.year||0)>0 && c.year<yr) return false;
    if (activeCats.length && !activeCats.includes(c.category) && c.category!=='otro') return false;
    if (activeCnts.length && !activeCnts.includes(c.country)) return false;
    if (q && !(c.title||'').toLowerCase().includes(q) && !(c.make||'').toLowerCase().includes(q)) return false;
    return true;
  });

  renderGrid();
  updateStats();
}

function setSort(s) {
  SORT = s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  renderGrid();
}

function toggleCat(el) {
  el.classList.toggle('on');
  applyFilters();
}
function toggleCnt(el) {
  el.classList.toggle('on');
  applyFilters();
}
function toggleFavsView() {
  SHOW_FAVS = !SHOW_FAVS;
  document.getElementById('favs-btn').classList.toggle('on', SHOW_FAVS);
  document.getElementById('favs-btn').textContent = SHOW_FAVS ? '★ Favoritos' : '☆ Favoritos';
  applyFilters();
}

function sorted() {
  return [...FILT].sort((a,b)=>{
    if (SORT==='profit') return (b.profit||0)-(a.profit||0);
    if (SORT==='margin') return (b.margin||0)-(a.margin||0);
    if (SORT==='price')  return (a.price||0)-(b.price||0);
    if (SORT==='tax')    return (a.tax||0)-(b.tax||0);
    return (b.opportunity_score||0)-(a.opportunity_score||0);
  });
}

      <img src="${imgUrl}" alt="${c.make||''} ${c.model||''}"
           onerror="this.parentElement.innerHTML='<div class=car-img-placeholder><span>🚗</span><small>${(c.make||'').substring(0,15)}</small></div>'">

      <div class="badge-tax ${c.taxInfo.cls}">IEDMT ${c.taxInfo.label}</div>

function renderGrid() {
  const s = sorted();
  if (!s.length) {
    const msg = SHOW_FAVS ? 'Pulsa ☆ en cualquier coche para guardarlo' : 'Prueba ampliando el precio o cambiando filtros';
    document.getElementById('grid').innerHTML = `<div class="empty"><strong>${SHOW_FAVS?'Sin favoritos':'Sin resultados'}</strong>${msg}</div>`;
    return;
  }
  document.getElementById('grid').innerHTML = s.map((c,i) => renderCard(c, ALL.indexOf(c))).join('');
}

async function loadSpainPrice(c, idx) {
  const data = await getSpainPrice(c);
  if (MODAL_IDX !== idx) return; // Modal changed

  const spEl = document.getElementById('spain-section');
  const resEl = document.getElementById('result-section');
  if (!spEl) return;

  if (data && data.avg) {
    const profit = data.avg - c.totalCost;
    const margin = Math.round((profit/data.avg)*100);

    spEl.innerHTML = `
      <div class="spain-modal-grid">
        <div class="spain-src-card has"><div class="ssc-name">Precio mín.</div><div class="ssc-val">${fmt(data.min)}</div></div>
        <div class="spain-src-card has"><div class="ssc-name">Precio medio</div><div class="ssc-val">${fmt(data.avg)}</div></div>
        <div class="spain-src-card has"><div class="ssc-name">Precio máx.</div><div class="ssc-val">${fmt(data.max)}</div></div>
      </div>
      <div class="spain-avg-box">
        <div><div class="sab-lbl">Precio medio mercado español</div><div style="font-size:10px;opacity:.6;margin-top:2px">Estimación basada en coches.net, autoscout24.es y milanuncios</div></div>
        <div class="sab-val">${fmt(data.avg)}</div>
      </div>`;

    if (resEl) {
      resEl.innerHTML = `
        <div><div class="rb-lbl">Beneficio estimado neto</div><div class="rb-margin">Margen: ${margin}% · Venta: ${fmt(data.avg)}</div></div>
        <div class="rb-val ${profit>0?'pos':'neg'}">${profit>0?'+':''}${fmt(profit)}</div>`;
    }

    // Update card in grid
    ALL[idx] = {...ALL[idx], spain_ref_price: data.avg, profit, margin};
    renderGrid();
  } else {
    spEl.innerHTML = `<div style="color:#888;font-size:12px;padding:8px;text-align:center">No se pudo obtener el precio. Intenta de nuevo.</div>`;
  }
}

function navModal(dir) {
  const newIdx = MODAL_IDX + dir;
  if (newIdx>=0 && newIdx<ALL.length) openModal(newIdx);
}

function closeModalFn(e) {
  if (e.target===document.getElementById('moverlay')) {
    document.getElementById('moverlay').classList.remove('open');
  }
}
function closeModalBtn() {
  document.getElementById('moverlay').classList.remove('open');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!document.getElementById('moverlay').classList.contains('open')) return;
  if (e.key==='ArrowLeft') navModal(-1);
  if (e.key==='ArrowRight') navModal(1);
  if (e.key==='Escape') closeModalBtn();
});

// ── STATS ────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-total').textContent = FILT.length;
  document.getElementById('s-favs').textContent = FAVS.size;
  const wm = FILT.filter(c=>c.margin>0);
  document.getElementById('s-margin').textContent = wm.length ? '+'+Math.round(wm.reduce((a,c)=>a+c.margin,0)/wm.length)+'%' : '—';
  const best = FILT.reduce((a,b)=>(a.profit||0)>(b.profit||0)?a:b, {profit:0});
  document.getElementById('s-best').textContent = best.profit>0 ? '+'+fmt(best.profit) : '—';
  document.getElementById('s-time').textContent = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
